<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control — Multi-Agent Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Monaco', 'Courier New', monospace;
      background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
      color: #e8e8e8;
      padding: 20px;
      line-height: 1.6;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #00d4ff;
    }
    
    h1 {
      font-size: 28px;
      background: linear-gradient(90deg, #00d4ff, #00ffaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .status-bar {
      display: flex;
      gap: 30px;
      align-items: center;
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    .status-dot.healthy { background: #00ff00; }
    .status-dot.warning { background: #ffaa00; }
    .status-dot.error { background: #ff0055; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .container {
      max-width: 1600px;
      margin: 0 auto;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .card {
      background: rgba(20, 35, 60, 0.8);
      border: 1px solid #00d4ff;
      border-radius: 8px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    
    .card-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #00ffaa;
    }
    
    .agent-card {
      position: relative;
    }
    
    .agent-status {
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }
    
    .agent-status-text {
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(0, 255, 170, 0.1);
      border: 1px solid #00ffaa;
      font-size: 11px;
    }
    
    .task-info {
      margin-top: 12px;
      padding: 10px;
      background: rgba(0, 212, 255, 0.05);
      border-left: 3px solid #00d4ff;
      border-radius: 4px;
      font-size: 12px;
    }
    
    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #00ffaa);
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 12px;
      font-size: 12px;
    }
    
    .metric {
      padding: 8px;
      background: rgba(0, 255, 170, 0.05);
      border: 1px solid rgba(0, 255, 170, 0.3);
      border-radius: 4px;
    }
    
    .metric-label {
      color: #00d4ff;
      font-size: 10px;
      text-transform: uppercase;
    }
    
    .metric-value {
      font-weight: bold;
      margin-top: 4px;
      color: #00ffaa;
      font-size: 14px;
    }
    
    .alerts-section {
      grid-column: 1 / -1;
    }
    
    .alert {
      padding: 12px;
      background: rgba(255, 100, 0, 0.1);
      border-left: 4px solid #ff6400;
      margin-bottom: 10px;
      border-radius: 4px;
      font-size: 12px;
    }
    
    .alert.critical {
      background: rgba(255, 0, 85, 0.1);
      border-left-color: #ff0055;
    }
    
    .lessons-section {
      grid-column: 1 / -1;
    }
    
    .lesson {
      padding: 12px;
      background: rgba(0, 255, 170, 0.05);
      border-left: 4px solid #00ffaa;
      margin-bottom: 10px;
      border-radius: 4px;
      font-size: 11px;
    }
    
    .lesson.success {
      border-left-color: #00ff00;
      background: rgba(0, 255, 0, 0.05);
    }
    
    .lesson.failure {
      border-left-color: #ff0055;
      background: rgba(255, 0, 85, 0.05);
    }
    
    .lesson-agent {
      color: #00d4ff;
      font-weight: bold;
      font-size: 10px;
      text-transform: uppercase;
    }
    
    .lesson-text {
      margin-top: 4px;
      color: #e8e8e8;
    }
    
    .hard-stops-section {
      grid-column: 1 / -1;
    }
    
    .hard-stop {
      padding: 12px;
      background: rgba(255, 170, 0, 0.1);
      border: 2px solid #ffaa00;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    
    .hard-stop-title {
      font-weight: bold;
      color: #ffaa00;
      margin-bottom: 8px;
    }
    
    .hard-stop-message {
      margin-bottom: 10px;
      font-size: 12px;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    button {
      padding: 6px 12px;
      border: 1px solid;
      border-radius: 4px;
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      transition: all 0.2s;
    }
    
    button:hover {
      background: rgba(0, 212, 255, 0.2);
      border-color: #00ffff;
    }
    
    button.success {
      border-color: #00ff00;
      color: #00ff00;
      background: rgba(0, 255, 0, 0.1);
    }
    
    button.success:hover {
      background: rgba(0, 255, 0, 0.2);
    }
    
    .timestamp {
      font-size: 10px;
      color: #888;
      margin-top: 10px;
      text-align: right;
    }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #00d4ff;
    }
    
    .tab {
      padding: 12px 20px;
      background: transparent;
      border: none;
      color: #00d4ff;
      cursor: pointer;
      font-weight: bold;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    
    .tab.active {
      border-bottom-color: #00ffaa;
      color: #00ffaa;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #00d4ff;
    }
    
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #00d4ff;
      border-radius: 50%;
      border-top-color: #00ffaa;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header>
    <h1>🎯 MISSION CONTROL</h1>
    <div class="status-bar">
      <div class="status-indicator">
        <div class="status-dot healthy" id="systemStatus"></div>
        <span id="statusText">System: INITIALIZING</span>
      </div>
      <div class="status-indicator">
        <span id="agentCount">Agents: 0/0</span>
      </div>
      <div class="status-indicator">
        <span id="taskCount">Tasks: 0</span>
      </div>
      <div class="status-indicator">
        <span id="alertCount">Alerts: 0</span>
      </div>
    </div>
  </header>
  
  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('command')">Command Center</button>
      <button class="tab" onclick="switchTab('tasks')">Task Board</button>
      <button class="tab" onclick="switchTab('analytics')">Performance</button>
      <button class="tab" onclick="switchTab('lessons')">Lessons</button>
      <button class="tab" onclick="switchTab('control')">Hard Stops</button>
    </div>
    
    <!-- Command Center Tab -->
    <div id="command" class="tab-content active">
      <div class="grid" id="commandGrid">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading agent status...</p>
        </div>
      </div>
    </div>
    
    <!-- Task Board Tab -->
    <div id="tasks" class="tab-content">
      <div class="grid" id="tasksGrid">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading tasks...</p>
        </div>
      </div>
    </div>
    
    <!-- Analytics Tab -->
    <div id="analytics" class="tab-content">
      <div class="grid" id="analyticsGrid">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading performance data...</p>
        </div>
      </div>
    </div>
    
    <!-- Lessons Tab -->
    <div id="lessons" class="tab-content">
      <div class="grid" id="lessonsGrid">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading lessons...</p>
        </div>
      </div>
    </div>
    
    <!-- Hard Stops Tab -->
    <div id="control" class="tab-content">
      <div class="grid" id="controlGrid">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading hard stops...</p>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    let ws = null;
    let state = {
      agents: {},
      tasks: {},
      lessons: [],
      hardStops: [],
      alerts: []
    };
    
    // Connect to WebSocket
    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
      
      ws.onopen = () => {
        console.log('[WS] Connected');
        updateStatusIndicator('healthy', 'System: READY');
        loadInitialData();
      };
      
      ws.onmessage = (event) => {
        const message = JSON.parse(event.data);
        handleMessage(message);
      };
      
      ws.onerror = (error) => {
        console.error('[WS] Error:', error);
        updateStatusIndicator('error', 'System: CONNECTION ERROR');
      };
      
      ws.onclose = () => {
        console.log('[WS] Disconnected');
        updateStatusIndicator('warning', 'System: RECONNECTING...');
        setTimeout(connectWebSocket, 3000);
      };
    }
    
    // Handle incoming messages
    function handleMessage(msg) {
      if (msg.type === 'initial_state') {
        state = msg;
        renderAll();
      } else if (msg.type === 'agent_update') {
        state.agents[msg.agent] = msg.data;
        renderCommandCenter();
      } else if (msg.type === 'task_created' || msg.type === 'task_progress') {
        state.tasks[msg.task.id] = msg.task;
        renderTasks();
      } else if (msg.type === 'hard_stop_resolved') {
        renderHardStops();
      }
    }
    
    // Load initial data via REST API
    async function loadInitialData() {
      try {
        const responses = await Promise.all([
          fetch('/api/agents').then(r => r.json()),
          fetch('/api/tasks').then(r => r.json()),
          fetch('/api/lessons').then(r => r.json()),
          fetch('/api/hard_stops').then(r => r.json())
        ]);
        
        state.agents = responses[0].agents.reduce((acc, a) => {
          acc[a.id] = a;
          return acc;
        }, {});
        
        state.tasks = responses[1].tasks.reduce((acc, t) => {
          acc[t.id] = t;
          return acc;
        }, {});
        
        state.lessons = responses[2].lessons;
        state.hardStops = responses[3].pending;
        
        renderAll();
      } catch (e) {
        console.error('Failed to load data:', e);
      }
    }
    
    // Render all views
    function renderAll() {
      renderCommandCenter();
      renderTasks();
      renderAnalytics();
      renderLessons();
      renderHardStops();
      updateHeaderStats();
    }
    
    // Render command center
    function renderCommandCenter() {
      const grid = document.getElementById('commandGrid');
      grid.innerHTML = '';
      
      // System status card
      const systemCard = document.createElement('div');
      systemCard.className = 'card';
      systemCard.innerHTML = `
        <div class="card-title">🎯 SYSTEM STATUS</div>
        <div style="font-size: 12px; line-height: 1.8;">
          <div>Uptime: <strong id="uptime">--</strong></div>
          <div>Agents Online: <strong id="agentsOnline">0/0</strong></div>
          <div>Tasks Active: <strong id="tasksActive">0</strong></div>
          <div class="timestamp" id="sysTimestamp">--</div>
        </div>
      `;
      grid.appendChild(systemCard);
      
      // Agent cards
      Object.values(state.agents).forEach(agent => {
        const card = document.createElement('div');
        card.className = 'card agent-card';
        
        const statusColor = agent.status === 'active' ? '#00ffaa' : agent.status === 'idle' ? '#00d4ff' : '#888';
        const statusEmoji = agent.status === 'active' ? '🟢' : agent.status === 'idle' ? '✅' : '⚠️';
        
        let performanceHtml = '';
        if (agent.performance && Object.keys(agent.performance).length > 0) {
          performanceHtml = `
            <div class="metrics">
              ${agent.performance.views ? `<div class="metric"><div class="metric-label">Views</div><div class="metric-value">${agent.performance.views.toLocaleString()}</div></div>` : ''}
              ${agent.performance.engagement ? `<div class="metric"><div class="metric-label">Engagement</div><div class="metric-value">${(agent.performance.engagement * 100).toFixed(1)}%</div></div>` : ''}
              ${agent.performance.costToday ? `<div class="metric"><div class="metric-label">Cost Today</div><div class="metric-value">$${agent.performance.costToday.toFixed(2)}</div></div>` : ''}
            </div>
          `;
        }
        
        card.innerHTML = `
          <div class="card-title" style="color: ${statusColor};">
            ${agent.name.charAt(0).toUpperCase() + agent.name.slice(1)}
          </div>
          <div class="agent-status">
            <span>${statusEmoji} ${agent.status.toUpperCase()}</span>
            <span>${new Date(agent.lastUpdate).toLocaleTimeString()}</span>
          </div>
          ${agent.currentTask ? `
            <div class="task-info">
              <strong>${agent.currentTask}</strong>
              ${agent.progress ? `<div class="progress-bar"><div class="progress-fill" style="width: ${(agent.progress * 100).toFixed(0)}%"></div></div>` : ''}
              ${agent.progress ? `<div style="margin-top: 4px; font-size: 10px; color: #00d4ff;">${(agent.progress * 100).toFixed(0)}% complete</div>` : ''}
            </div>
          ` : '<div style="color: #888; margin-top: 8px; font-size: 11px;">No active task</div>'}
          ${performanceHtml}
        `;
        
        grid.appendChild(card);
      });
    }
    
    // Render task board
    function renderTasks() {
      const grid = document.getElementById('tasksGrid');
      const tasks = Object.values(state.tasks).filter(t => t.progress < 1);
      
      if (tasks.length === 0) {
        grid.innerHTML = '<div class="card" style="grid-column: 1/-1;"><p style="color: #888;">No active tasks</p></div>';
        return;
      }
      
      grid.innerHTML = '';
      tasks.forEach(task => {
        const card = document.createElement('div');
        card.className = 'card';
        
        let stepsHtml = '';
        if (task.steps && task.steps.length > 0) {
          stepsHtml = '<div style="font-size: 11px; margin-top: 8px;">';
          task.steps.forEach(step => {
            const icon = step.status === 'complete' ? '✅' : step.status === 'active' ? '🟢' : '⏳';
            stepsHtml += `<div>${icon} ${step.name}</div>`;
          });
          stepsHtml += '</div>';
        }
        
        card.innerHTML = `
          <div class="card-title">📱 ${task.name}</div>
          <div style="font-size: 12px; margin-bottom: 8px; color: #00d4ff;">${task.agent.toUpperCase()}</div>
          <div class="progress-bar"><div class="progress-fill" style="width: ${(task.progress * 100).toFixed(0)}%"></div></div>
          <div style="margin-top: 4px; font-size: 10px; color: #00d4ff;">${(task.progress * 100).toFixed(0)}% complete</div>
          ${stepsHtml}
          <div class="timestamp">Started: ${new Date(task.started).toLocaleTimeString()}</div>
        `;
        
        grid.appendChild(card);
      });
    }
    
    // Render analytics
    function renderAnalytics() {
      const grid = document.getElementById('analyticsGrid');
      grid.innerHTML = '';
      
      if (state.agents.atlas && state.agents.atlas.performance) {
        const perf = state.agents.atlas.performance;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-title">📊 ATLAS PERFORMANCE (24h)</div>
          <div class="metrics" style="grid-template-columns: 1fr;">
            ${perf.views ? `<div class="metric"><div class="metric-label">Views</div><div class="metric-value">${perf.views.toLocaleString()}</div></div>` : ''}
            ${perf.engagement ? `<div class="metric"><div class="metric-label">Engagement Rate</div><div class="metric-value">${(perf.engagement * 100).toFixed(1)}%</div></div>` : ''}
            ${perf.postsMonth ? `<div class="metric"><div class="metric-label">Posts/Month</div><div class="metric-value">${perf.postsMonth}</div></div>` : ''}
            ${perf.costAvg ? `<div class="metric"><div class="metric-label">Cost/Post</div><div class="metric-value">$${perf.costAvg.toFixed(2)}</div></div>` : ''}
            ${perf.costToday ? `<div class="metric"><div class="metric-label">Cost Today</div><div class="metric-value">$${perf.costToday.toFixed(2)}</div></div>` : ''}
          </div>
        `;
        grid.appendChild(card);
      }
    }
    
    // Render lessons
    function renderLessons() {
      const grid = document.getElementById('lessonsGrid');
      
      if (state.lessons.length === 0) {
        grid.innerHTML = '<div class="card" style="grid-column: 1/-1;"><p style="color: #888;">No lessons captured yet</p></div>';
        return;
      }
      
      grid.innerHTML = '';
      state.lessons.slice(-5).reverse().forEach(lesson => {
        const card = document.createElement('div');
        card.className = `card lesson ${lesson.type}`;
        
        const typeEmoji = lesson.type === 'success' ? '🟢' : '🔴';
        
        card.innerHTML = `
          <div style="font-weight: bold; margin-bottom: 4px;">${typeEmoji} ${lesson.type.toUpperCase()}</div>
          <div class="lesson-agent">${lesson.agent}</div>
          <div class="lesson-text">${lesson.lesson}</div>
          <div class="timestamp">${new Date(lesson.timestamp).toLocaleString()}</div>
        `;
        
        grid.appendChild(card);
      });
    }
    
    // Render hard stops
    function renderHardStops() {
      const grid = document.getElementById('controlGrid');
      
      const pending = state.hardStops.filter(hs => !hs.resolved);
      
      if (pending.length === 0) {
        grid.innerHTML = '<div class="card" style="grid-column: 1/-1;"><p style="color: #00ffaa;">✅ No decisions pending</p></div>';
        return;
      }
      
      grid.innerHTML = '';
      pending.forEach(hs => {
        const card = document.createElement('div');
        card.className = 'card hard-stops-section';
        
        let buttonsHtml = '';
        if (hs.options) {
          buttonsHtml = '<div class="button-group" style="margin-top: 10px;">';
          hs.options.forEach(opt => {
            buttonsHtml += `<button class="${opt === 'approve' ? 'success' : ''}" onclick="submitHardStopDecision('${hs.id}', '${opt}')">${opt.toUpperCase()}</button>`;
          });
          buttonsHtml += '</div>';
        }
        
        card.innerHTML = `
          <div class="hard-stop">
            <div class="hard-stop-title">⚠️ ${hs.type}</div>
            <div class="hard-stop-message">${hs.message}</div>
            <div style="font-size: 10px; color: #888; margin-bottom: 10px;">Agent: <strong>${hs.agent.toUpperCase()}</strong></div>
            ${buttonsHtml}
          </div>
        `;
        
        grid.appendChild(card);
      });
    }
    
    // Update header statistics
    function updateHeaderStats() {
      const agentsOnline = Object.values(state.agents).filter(a => a.status !== 'offline').length;
      const tasksActive = Object.values(state.tasks).filter(t => t.progress < 1).length;
      const alertsCount = state.hardStops.filter(hs => !hs.resolved).length;
      
      document.getElementById('agentCount').textContent = `Agents: ${agentsOnline}/${Object.keys(state.agents).length}`;
      document.getElementById('taskCount').textContent = `Tasks: ${tasksActive}`;
      document.getElementById('alertCount').textContent = `Alerts: ${alertsCount}`;
    }
    
    // Tab switching
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(tabName).classList.add('active');
    }
    
    // Submit hard stop decision
    async function submitHardStopDecision(id, decision) {
      try {
        const response = await fetch(`/api/hard_stops/${id}/decision`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ decision, reason: 'User decision via Mission Control' })
        });
        
        if (response.ok) {
          const data = await response.json();
          console.log('Hard stop resolved:', data);
          loadInitialData();
        }
      } catch (e) {
        console.error('Failed to submit decision:', e);
      }
    }
    
    // Update status indicator
    function updateStatusIndicator(status, text) {
      document.getElementById('systemStatus').className = `status-dot ${status}`;
      document.getElementById('statusText').textContent = text;
    }
    
    // Start on load
    window.addEventListener('DOMContentLoaded', () => {
      connectWebSocket();
    });
  </script>
</body>
</html>
